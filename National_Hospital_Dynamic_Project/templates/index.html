<!DOCTYPE html>
<html><head>
<title>National Hospital</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head><body class="container mt-4">
<h1>🏥 National Hospital Noida</h1>
<h3>Patients: {{ total_patients }} | Doctors: {{ total_doctors }} | Appointments: {{ total_appointments }}</h3>

<table class="table">
<tr><th>ID</th><th>Name</th><th>Age</th><th>Disease</th></tr>
{% for patient in patients %}
<tr>
<td>{{ patient.id }}</td>
<td>{{ patient.name }}</td>
<td>{{ patient.age }}</td>
<td>{{ patient.disease }}</td>
</tr>
{% endfor %}
</table>

<form method="POST" action="/book">
<input name="patient" class="form-control mb-2" placeholder="Patient Name" required>
<select name="doctor" class="form-control mb-2">
{% for doctor in doctors %}<option>{{ doctor }}</option>{% endfor %}
</select>
<input type="date" name="date" class="form-control mb-2">
<select name="time" class="form-control mb-2">
{% for slot in slots %}<option>{{ slot }}</option>{% endfor %}
</select>
<button class="btn btn-primary">Book Appointment</button>
</form>
</body></html>
